name: Build Android APK (自动打包安卓APK)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # 支持在 GitHub 页面手动点击按钮打包

jobs:
  build:
    name: Build APK Task
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 2. 设置 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      # 3. 安装依赖并编译 Web 端资源 (Vite -> dist)
      - name: Install Dependencies & Build Web App
        run: |
          npm install --legacy-peer-deps --no-audit --no-fund
          npm run build

      # 4. 同步 Capacitor 资源到 Android 工程
      - name: Capacitor Sync
        run: |
          npx cap sync

      # 5. 设置 Java 21 环境 (配置稳定的 Android SDK 与 AGP 8.5+ 另外为了支持 Capacitor 6 所需)
      - name: Setup Java JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      # 6. 缓存 Gradle 依赖，加快后续打包速度
      - name: Cache Gradle Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 6.5 修复可能损坏的 gradle-wrapper.jar 文件 (用 runner 自带的 gradle 重新生成)
      - name: Fix Gradle Wrapper Jar
        run: |
          cd android
          gradle wrapper --gradle-version 8.7 --distribution-type all

      # 7. 给 gradlew 可执行权限，并使用 Gradle 编译 Android APK
      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      # 8. 收集打包好的 APK 并上传为 GitHub Artifact 产物
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DD代驾司机端-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7 # 临时保存 7 天
